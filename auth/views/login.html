<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-weight='700' font-size='16' fill='%23f8f4ee'%3EN%3C/text%3E%3C/svg%3E" />
  <title>Sign in — DeployMagi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist Mono', 'SFMono-Regular', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      background: #f8f4ee;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { width: 100%; max-width: 24rem; margin: 0 auto; padding: 2rem; }
    .title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { font-size: 0.75rem; color: #8a8a8a; text-align: center; margin-bottom: 2rem; }
    .oauth-links { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .oauth-link {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      font-size: 0.75rem; text-decoration: underline; text-underline-offset: 4px;
      color: #000; transition: opacity 0.15s; cursor: pointer;
      padding: 0.5rem 0;
    }
    .oauth-link:hover { opacity: 0.6; }
    .oauth-link svg { width: 1rem; height: 1rem; flex-shrink: 0; }
    .divider { position: relative; margin-bottom: 1.5rem; }
    .divider-line { width: 100%; border: 0; border-top: 1px solid #e5e5e5; }
    .divider-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #f8f4ee; padding: 0 0.75rem; font-size: 10px; color: #8a8a8a;
    }
    .email-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .email-input {
      font-family: inherit; font-size: 0.875rem; color: #000;
      border: 0; border-bottom: 1px solid #d4d4d4; background: transparent;
      padding: 0.25rem 0; outline: none; width: 100%;
    }
    .email-input::placeholder { color: #737373; }
    .email-input:focus { border-bottom-color: #000; }
    .submit-btn {
      font-family: inherit; font-size: 0.75rem; color: #000; background: transparent;
      border: 0; text-decoration: underline; text-underline-offset: 4px;
      cursor: pointer; transition: opacity 0.15s; padding: 0.5rem 0;
    }
    .submit-btn:hover { opacity: 0.6; }
    .message { margin-top: 1rem; text-align: center; font-size: 0.75rem; color: #8a8a8a; display: none; }
    .message.visible { display: block; }
    .message.success { color: #16a34a; }
    .message.error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <h1 class="title">DeployMagi</h1>
      <p class="subtitle">Sign in to your workspace</p>
    </div>

    <div class="oauth-links">
      <a href="/auth/github__REDIRECT_PARAM__" class="oauth-link">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </a>

      <a href="/auth/google__REDIRECT_PARAM__" class="oauth-link">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>
    </div>

    <div class="divider">
      <hr class="divider-line" />
      <span class="divider-text">or</span>
    </div>

    <form id="email-form" class="email-form">
      <input type="email" name="email" required placeholder="you@example.com" class="email-input">
      <button type="submit" class="submit-btn">Send magic link</button>
    </form>

    <div id="email-message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('email-form');
    const msg = document.getElementById('email-message');
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value;
      msg.classList.add('visible');
      msg.classList.remove('success', 'error');
      msg.textContent = 'Sending...';

      try {
        const res = await fetch('/auth/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ email, redirect }),
        });
        const data = await res.json();
        msg.textContent = data.message || 'Check your email for a sign-in link';
        if (res.ok) {
          msg.classList.add('success');
        } else {
          msg.classList.add('error');
        }
      } catch {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.classList.add('error');
      }
    });
  </script>
</body>
</html>
