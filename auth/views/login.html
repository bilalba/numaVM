<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8f4ee" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-weight='700' font-size='16' fill='%23f8f4ee'%3EN%3C/text%3E%3C/svg%3E" />
  <title>Sign in — NumaVM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet" />
  <script>
    (function() {
      var pref = localStorage.getItem('theme') || 'system';
      var resolved = pref;
      if (pref === 'system') {
        resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', resolved);
      document.documentElement.setAttribute('data-theme-pref', pref);
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', resolved === 'dark' ? '#1a1a1a' : '#f8f4ee');
    })();
  </script>
  <style>
    :root {
      --background: #f8f4ee;
      --foreground: #000000;
      --muted: #8a8a8a;
      --surface: #ffffff;
      --neutral-200: #e0dcd6;
      --neutral-300: #d0ccc6;
      --neutral-500: #8a8a8a;
    }
    [data-theme="dark"] {
      --background: #1a1a1a;
      --foreground: #e0e0e0;
      --muted: #888888;
      --surface: #2a2a2a;
      --neutral-200: #333333;
      --neutral-300: #444444;
      --neutral-500: #888888;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Geist Mono', 'SFMono-Regular', Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { width: 100%; max-width: 24rem; margin: 0 auto; padding: 2rem; }
    .title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; text-align: center; }
    .subtitle { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 2rem; }
    .oauth-links { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .oauth-link {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      font-size: 0.75rem; text-decoration: underline; text-underline-offset: 4px;
      color: var(--foreground); transition: opacity 0.15s; cursor: pointer;
      padding: 0.5rem 0;
    }
    .oauth-link:hover { opacity: 0.6; }
    .oauth-link svg { width: 1rem; height: 1rem; flex-shrink: 0; }
    .divider { position: relative; margin-bottom: 1.5rem; }
    .divider-line { width: 100%; border: 0; border-top: 1px solid var(--neutral-200); }
    .divider-text {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--background); padding: 0 0.75rem; font-size: 10px; color: var(--muted);
    }
    .email-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .email-input {
      font-family: inherit; font-size: 0.875rem; color: var(--foreground);
      border: 0; border-bottom: 1px solid var(--neutral-300); background: transparent;
      padding: 0.25rem 0; outline: none; width: 100%;
    }
    .email-input::placeholder { color: var(--neutral-500); }
    .email-input:focus { border-bottom-color: var(--foreground); }
    .submit-btn {
      font-family: inherit; font-size: 0.75rem; color: var(--foreground); background: transparent;
      border: 0; text-decoration: underline; text-underline-offset: 4px;
      cursor: pointer; transition: opacity 0.15s; padding: 0.5rem 0;
    }
    .submit-btn:hover { opacity: 0.6; }
    .message { margin-top: 1rem; text-align: center; font-size: 0.75rem; color: var(--muted); display: none; }
    .message.visible { display: block; }
    .message.success { color: #16a34a; }
    .message.error { color: #dc2626; }
    .theme-toggle {
      position: fixed; top: 0.75rem; right: 0.75rem;
      background: none; border: 0; color: var(--muted); cursor: pointer;
      padding: 0.25rem; transition: opacity 0.15s;
    }
    .theme-toggle:hover { opacity: 0.6; }
    .theme-toggle svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme"></button>

  <div class="container">
    <div>
      <h1 class="title">NumaVM</h1>
      <p class="subtitle" id="subtitle">Sign in to your workspace</p>
    </div>

    <div class="oauth-links">
      <a href="/auth/github__REDIRECT_PARAM__" class="oauth-link">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        Continue with GitHub
      </a>

      <a href="/auth/google__REDIRECT_PARAM__" class="oauth-link">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>
    </div>

    <div class="divider">
      <hr class="divider-line" />
      <span class="divider-text">or</span>
    </div>

    <form id="email-form" class="email-form">
      <input type="email" name="email" required placeholder="you@example.com" class="email-input" value="__EMAIL_VALUE__">
      <button type="submit" class="submit-btn">Send magic link</button>
    </form>

    <div id="email-message" class="message"></div>
  </div>

  <script>
    // Theme toggle
    (function() {
      var CYCLE = ['system', 'light', 'dark'];
      var ICONS = {
        system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
        light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
        dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>'
      };
      var btn = document.getElementById('theme-toggle');
      var pref = localStorage.getItem('theme') || 'system';

      function apply(p) {
        var resolved = p;
        if (p === 'system') resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.setAttribute('data-theme-pref', p);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', resolved === 'dark' ? '#1a1a1a' : '#f8f4ee');
        btn.innerHTML = ICONS[p];
        btn.title = 'Theme: ' + p;
      }

      apply(pref);

      btn.addEventListener('click', function() {
        var i = CYCLE.indexOf(pref);
        pref = CYCLE[(i + 1) % CYCLE.length];
        if (pref === 'system') localStorage.removeItem('theme');
        else localStorage.setItem('theme', pref);
        apply(pref);
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
        if (pref === 'system') apply('system');
      });
    })();

    // Email form
    const form = document.getElementById('email-form');
    const msg = document.getElementById('email-message');
    const subtitle = document.getElementById('subtitle');
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/';
    const error = params.get('error') || '';

    // Email pre-filled server-side from cookie (SSH key linking flow)
    const prefilled = form.email.value;
    if (prefilled) {
      subtitle.textContent = 'Verify your identity as ' + prefilled;
      form.email.readOnly = true;
      form.email.style.opacity = '0.6';
    }

    // Show error for email mismatch
    if (error === 'email_mismatch') {
      msg.classList.add('visible', 'error');
      msg.textContent = 'Please sign in with the correct email address.';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value;
      msg.classList.add('visible');
      msg.classList.remove('success', 'error');
      msg.textContent = 'Sending...';

      try {
        const res = await fetch('/auth/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ email, redirect }),
        });
        const data = await res.json();
        msg.textContent = data.message || 'Check your email for a sign-in link';
        if (res.ok) {
          msg.classList.add('success');
        } else {
          msg.classList.add('error');
        }
      } catch {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.classList.add('error');
      }
    });
  </script>
</body>
</html>
