# DeployMagi — Firecracker Configuration
#
# Sourced by control-plane services and shell scripts.
# Override via environment variables or .env file.

# Firecracker install directory
FC_INSTALL_DIR=/opt/firecracker

# Binary paths
FC_BIN=${FC_INSTALL_DIR}/bin/firecracker
JAILER_BIN=${FC_INSTALL_DIR}/bin/jailer

# Kernel
FC_KERNEL=${FC_INSTALL_DIR}/kernel/vmlinux

# Base rootfs image (read-only, shared by all VMs)
FC_ROOTFS=${FC_INSTALL_DIR}/rootfs/base.ext4

# Per-env data directory (overlay, snapshots, etc.)
# Each env gets: ${DATA_DIR}/${slug}/overlay/ and ${DATA_DIR}/${slug}/snapshot/
DATA_DIR=/data/envs

# Networking
BRIDGE_IF=br0
VM_SUBNET=172.16.0.0/16
VM_GATEWAY=172.16.0.1

# VM defaults
VM_VCPU_COUNT=2
VM_MEM_SIZE_MIB=512

# Vsock CID range (CID 0-2 are reserved)
VSOCK_CID_START=3

# Idle shutdown
IDLE_TIMEOUT_MS=900000
IDLE_POLL_INTERVAL_MS=30000

# Firecracker API socket directory
FC_SOCKET_DIR=/tmp

# TAP device helper scripts
TAP_CREATE=${FC_INSTALL_DIR}/bin/create-tap
TAP_DESTROY=${FC_INSTALL_DIR}/bin/destroy-tap
DNAT_ADD=${FC_INSTALL_DIR}/bin/add-dnat
DNAT_REMOVE=${FC_INSTALL_DIR}/bin/remove-dnat
